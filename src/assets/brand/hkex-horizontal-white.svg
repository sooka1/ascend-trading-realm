<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 340" width="1180" height="340" fill="none">
  <g transform="translate(70,60)">
    <!-- red candlestick tick (brand accent) -->
    <rect x="-30" y="70" width="4" height="60" fill="#E31B23"/>

    <!-- H -->
    <rect x="0"   y="0"  width="22" height="200" fill="#FFFFFF"/>
    <rect x="138" y="0"  width="22" height="200" fill="#FFFFFF"/>
    <rect x="22"  y="89" width="116" height="22" fill="#FFFFFF"/>

    <!-- K -->
    <rect x="230" y="0" width="22" height="200" fill="#FFFFFF"/>
    <polygon points="252,89 252,111 386,-14 355,-14" fill="#FFFFFF"/>
    <polygon points="252,89 252,111 355,214 386,214" fill="#FFFFFF"/>

    <!-- E -->
    <rect x="450" y="0"   width="22"  height="200" fill="#FFFFFF"/>
    <rect x="450" y="0"   width="164" height="22"  fill="#FFFFFF"/>
    <rect x="450" y="89"  width="128" height="22"  fill="#FFFFFF"/>
    <rect x="450" y="178" width="164" height="22"  fill="#FFFFFF"/>

    <!-- X with red candlestick apex -->
    <polygon points="670,-14 692,-14 852,214 830,214" fill="#FFFFFF"/>
    <polygon points="830,-14 852,-14 823,26 801,26" fill="#E31B23"/>
    <polygon points="801,26 823,26 692,214 670,214" fill="#FFFFFF"/>

    <!-- hairline rule -->
    <rect x="0" y="238" width="852" height="1" fill="#FFFFFF" opacity="0.35"/>

    <!-- tagline -->
    <text x="0" y="266"
          font-family="'Helvetica Neue','Inter','Arial',sans-serif"
          font-size="18" font-weight="500"
          letter-spacing="14"
          fill="#FFFFFF" opacity="0.85">GLOBAL  MARKETS</text>
  </g>
</svg>
